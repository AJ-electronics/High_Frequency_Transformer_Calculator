<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>High Frequency Transformer Calculator</title>

<link rel="stylesheet" href="style.css">

<script src="./data/materials.js"></script>
<script src="./data/cores.js"></script>
<script src="./data/awg.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="header">

<img src="./Pictures/logo.png" class="logo">

<h1>High Frequency Transformer Calculator</h1>

</div>


<div class="container">

<!-- LEFT PANEL -->

<div class="left-panel">

<h2>Electrical Parameters</h2>

<label>Input Voltage (V)</label>
<input id="vin">

<label>Output Voltage (V)</label>
<input id="vout">

<label>Frequency (kHz)</label>
<input id="freq">

<label>Power Rating (VA)</label>
<input id="power">

<hr>

<h2>Core Selection</h2>

<div class="core-buttons">

<button class="core-btn" onclick="selectCoreType(this,'ETD')">
<img src="./Pictures/etd.png">
<span>ETD</span>
</button>

<button class="core-btn" onclick="selectCoreType(this,'EE')">
<img src="./Pictures/ee.png">
<span>EE</span>
</button>

<button class="core-btn" onclick="selectCoreType(this,'PQ')">
<img src="./Pictures/pq.png">
<span>PQ</span>
</button>

<button class="core-btn" onclick="selectCoreType(this,'RM')">
<img src="./Pictures/rm.png">
<span>RM</span>
</button>

<button class="core-btn" onclick="selectCoreType(this,'EP')">
<img src="./Pictures/ep.png">
<span>EP</span>
</button>

<button class="core-btn" onclick="selectCoreType(this,'EFD')">
<img src="./Pictures/efd.png">
<span>EFD</span>
</button>

<button class="core-btn" onclick="selectCoreType(this,'Toroidal')">
<img src="./Pictures/toroidal.png">
<span>Toroidal</span>
</button>

</div>

<input type="hidden" id="coretype" value="ETD">

Material

<select id="material">

<option>N87</option>
<option>N97</option>
<option>PC40</option>
<option>3C90</option>
<option>3F3</option>

</select>

<button onclick="calculate()">Calculate</button>

<div id="calcResults"></div>

<hr>

<h3>Select Core</h3>

<select id="selectedCore" onchange="showCoreInfo()"></select>

<div id="coreInfo"></div>

<hr>

<h3>Design Flux Density</h3>

<input id="Buser" value="0.2">

<button onclick="calculateTurns()">Calculate Turns</button>

<div id="turnResults"></div>

<h3>Inductance</h3>
<div id="inductanceResults"></div>

<h3>Core Loss</h3>
<div id="coreLossResults"></div>

<hr>

<h3>Wire Selection</h3>

Primary Wire
<select id="primaryWire"></select>

Secondary Wire
<select id="secondaryWire"></select>

<button onclick="calculateStrands()">Calculate Strands</button>

<div id="strandResult"></div>

<h3>Copper Loss</h3>
<div id="copperLossResults"></div>

<h3>Design Checks</h3>
<div id="designChecks"></div>

<br>

<button id="pdfBtn" onclick="generatePDF()" style="display:none;">
Download PDF
</button>

</div>


<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="core-preview-box">

<h3>Core Preview</h3>

<img id="coreImage" src="./Pictures/etd.png" class="core-preview">

</div>

</div>

</div>

<script type="module" src="./script.js"></script>

</body>
</html>
