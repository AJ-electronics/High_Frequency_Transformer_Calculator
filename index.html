<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>High Frequency Transformer Calculator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>High Frequency Transformer Calculator</h1>

<hr>

<h2>Electrical Parameters</h2>

Input Voltage (V)
<input id="vin"><br>

Output Voltage (V)
<input id="vout"><br>

Frequency (kHz)
<input id="freq"><br>

Power Rating (VA)
<input id="power"><br>

<hr>

<h2>Core Selection</h2>

Core Type
<select id="coretype">
<option>ETD</option>
<option>EE</option>
</select>

Material
<select id="material">
<option>N87</option>
<option>N97</option>
<option>PC40</option>
<option>3C90</option>
<option>3F3</option>
</select>

<button onclick="calculate()">Calculate</button>

<div id="calcResults"></div>

<hr>

<h3>Select Core</h3>

<select id="selectedCore" onchange="showCoreInfo()"></select>

<div id="coreInfo"></div>

<hr>

<h3>Design Flux Density</h3>

<input id="Buser" value="0.2">

<button onclick="calculateTurns()">Calculate Turns</button>

<div id="turnResults"></div>

<h3>Inductance</h3>
<div id="inductanceResults"></div>

<h3>Core Loss</h3>
<div id="coreLossResults"></div>

<hr>

<h3>Wire Selection</h3>

Primary Wire
<select id="primaryWire"></select>

Secondary Wire
<select id="secondaryWire"></select>

<button onclick="calculateStrands()">Calculate Strands</button>

<div id="strandResult"></div>

<h3>Copper Loss</h3>
<div id="copperLossResults"></div>

<h3>Design Checks</h3>
<div id="designChecks"></div>

<br>

<button id="pdfBtn" onclick="generatePDF()" style="display:none;">
Download PDF
</button>

<script src="script.js"></script>

</body>
</html>
