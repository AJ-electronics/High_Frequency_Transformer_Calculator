<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HF Transformer Designer Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>HF Transformer Designer</h1>
        
        <section class="card">
            <h2>1. Specifications</h2>
            <div class="grid">
                <label>Input Voltage (V) <input type="number" id="vin" value="12"></label>
                <label>Output Voltage (V) <input type="number" id="vout" value="310"></label>
                <label>Frequency (kHz) <input type="number" id="freq" value="50"></label>
                <label>Power (W) <input type="number" id="power" value="100"></label>
            </div>
        </section>

        <section class="card">
            <h2>2. Core & Material</h2>
            <select id="coretype"><option>ETD</option><option>EE</option></select>
            <select id="material">
                <option>N87</option><option>N97</option><option>PC40</option>
            </select>
            <button onclick="calculate()">Find Suitable Cores</button>
            <div id="calcResults" class="results"></div>
        </section>

        <section class="card">
            <h2>3. Winding Design</h2>
            <label>Select Core: <select id="selectedCore" onchange="showCoreInfo()"></select></label>
            <label>Design Flux (Bmax): <input id="Buser" type="number" step="0.01" value="0.15"></label>
            <button onclick="calculateTurns()">Calculate Turns</button>
            <div id="turnResults" class="results"></div>
            <div id="coreLossResults"></div>
        </section>

        <section class="card">
            <h2>4. Wire Geometry</h2>
            <label>Primary AWG: <select id="primaryWire"></select></label>
            <label>Secondary AWG: <select id="secondaryWire"></select></label>
            <button onclick="calculateStrands()">Calculate Stranding</button>
            <div id="strandResult" class="results"></div>
        </section>

        <section class="ai-section">
            <button class="ai-btn" onclick="askAI()">🚀 AI Design Review</button>
            <div id="aiResults"></div>
        </section>

        <button id="pdfBtn" style="display:none;" onclick="generatePDF()">Download Design Report</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
