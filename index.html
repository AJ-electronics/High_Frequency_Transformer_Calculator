<!doctype html>
<html>
  <head>
    <title>Transformer Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h2>Transformer Calculator</h2>

    Input Voltage:
    <input id="vin" /><br /><br />

    Output Voltage:
    <input id="vout" /><br /><br />

    Frequency:
    <input id="freq" /><br /><br />

    Core Area (Ae):
    <input id="ae" /><br /><br />

    Flux Density (Bmax):
    <input id="b" /><br /><br />

    <button onclick="calculate()">Calculate</button>

    <p id="result"></p>

    <script src="script.js"></script>
  </body>
</html>
